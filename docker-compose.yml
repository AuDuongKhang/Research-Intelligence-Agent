version: "3.8"

services:
  backend:
    build: ./backend
    container_name: research-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - research-network

  frontend:
    build: ./frontend
    container_name: research-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/app/api/chat/.env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - research-network

networks:
  research-network:
    driver: bridge
